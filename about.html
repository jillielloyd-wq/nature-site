<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Nature</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-box">🌿 NATURE GUIDE</div>
        <div class="dropdown">
            <button class="dropbtn">Menu ☰</button>
            <div class="dropdown-content">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="dangerous.html">Dangerous</a>
                <a href="help.html">Preserve</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="bubbly-border card" style="width: 85%; max-width: 1100px; cursor: pointer;" onclick="startNature()">
            <img src="understand1.jpg" style="height: 600px; width: 100%; object-fit: cover;">
            <div style="padding: 30px; text-align: center;">
                <p style="font-weight:bold; color:#1b4332; font-size: 2.5rem; margin: 0;">Click Photo for Nature Facts!</p>
            </div>
        </div>

        <div id="factBox" class="fact-box">
            <h2 style="font-size: 2.5rem;">Nature Facts 🌱</h2>
            <p style="font-size: 1.6rem;">Nature is a complex web of life. Every plant and animal plays a role in keeping the earth healthy. When we protect nature, we protect our future!</p>
        </div>
    </div>

    <script>
        function startNature() {
            document.getElementById('factBox').style.display = 'block';
            for(let i=0; i<40; i++) {
                const e = document.createElement('div');
                e.className = 'emoji';
                const icons = ['🌿','🍃','🌻','🌲','🌸','🌼','🍀'];
                e.innerText = icons[Math.floor(Math.random() * icons.length)];
                e.style.left = Math.random() * 100 + 'vw';
                e.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(e);
                setTimeout(() => { e.remove(); }, 5000);
            }
            document.getElementById('factBox').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
