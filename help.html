<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature Guide | Preserve</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo-box">🌿 NATURE GUIDE</div>
        <div class="dropdown">
            <button class="dropbtn">Menu ☰</button>
            <div class="dropdown-content">
                <a href="index.html">Home</a>
                <a href="about.html">About Nature</a>
                <a href="dangerous.html">Dangerous</a>
                <a href="help.html">Preserve</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="bubbly-border card" style="width: 90%; max-width: 1200px;">
            <img src="persves.jpg" style="height: 650px; width: 100%; object-fit: cover;">
            <div style="padding: 40px;">
                <h1 style="font-size: 4rem; color: #1b4332;">
                    How to Preserve Our 
                    <span onclick="startEarth()" style="cursor: pointer; text-decoration: underline; color: #2d6a4f;">World</span> 🌎
                </h1>
            </div>
        </div>

        <div id="preserveFacts" class="fact-box">
            <h2 style="font-size: 3rem;">Get Involved! 🌎</h2>
            <p style="font-size: 1.8rem; line-height: 1.8; text-align: left;">
                🌟 <b>Reduce Plastic:</b> Help keep the oceans blue.<br>
                🌳 <b>Plant Trees:</b> Provide homes for wildlife.<br>
                🚶 <b>Walk More:</b> Cut down on air pollution.
            </p>
        </div>
    </div>

    <script>
        function startEarth() {
            document.getElementById('preserveFacts').style.display = 'block';
            for(let i=0; i<50; i++) {
                const e = document.createElement('div');
                e.className = 'emoji';
                e.innerText = '🌎';
                e.style.left = Math.random() * 100 + 'vw';
                e.style.animationDuration = (Math.random() * 2 + 3) + 's';
                document.body.appendChild(e);
                setTimeout(() => { e.remove(); }, 5000);
            }
            document.getElementById('preserveFacts').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
