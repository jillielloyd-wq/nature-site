<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature Guide | Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .framed-title {
            display: inline-block;
            border: 4px solid #1b4332;
            padding: 15px 40px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.4);
            margin: 40px 0;
        }
        .home-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .nav-card { background: white; width: 300px; border-radius: 40px; overflow: hidden; border: 8px solid white; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .card-img { width: 100%; height: 200px; object-fit: cover; }
        .card-body { padding: 25px; text-align: center; }
        /* Making the buttons longer as requested */
        .btn-long { display: block; background: #1b4332; color: white; text-decoration: none; padding: 15px; border-radius: 40px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🌿 NATURE GUIDE</div>
        <button id="menuBtn" class="menu-toggle">Show Menu ☰</button>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Nature</a></li>
            <li><a href="dangerous.html">Dangerous</a></li>
            <li><a href="help.html">Preserve</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="framed-title">
            <h1 style="margin: 0;">The Ultimate Nature Guide 🌱</h1>
        </div>

        <div class="home-grid">
            <div class="nav-card">
                <img src="https://image.pollinations.ai/prompt/beautiful%20lush%20green%20forest%20landscape" class="card-img">
                <div class="card-body">
                    <h3>About Nature</h3>
                    <a href="about.html" class="btn-long">Click here for About Nature</a>
                </div>
            </div>

            <div class="nav-card">
                <img src="https://image.pollinations.ai/prompt/AI%20roaring%20jaguar%20detailed" class="card-img">
                <div class="card-body">
                    <h3>Dangerous</h3>
                    <a href="dangerous.html" class="btn-long">Click here for Dangerous</a>
                </div>
            </div>

            <div class="nav-card">
                <img src="https://image.pollinations.ai/prompt/AI%20person%20picking%20up%20trash%20in%20nature" class="card-img">
                <div class="card-body">
                    <h3>Preserve</h3>
                    <a href="help.html" class="btn-long">Click here for Preserve</a>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
